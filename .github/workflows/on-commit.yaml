name: Sync shared files

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "shared/**"
      - "config.json"
      - "tools/scripts/syncAllRepos.mts"

concurrency:
  group: sync-shared-files-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.POLICY_SYNC_APP_ID }}
          private-key: ${{ secrets.POLICY_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Sync shared files
        env:
          POLICY_SYNC_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: npm run sync-shared-files
